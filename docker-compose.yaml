services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: gobank
      POSTGRES_PASSWORD: gobank
      POSTGRES_DB: onboarding
      TZ: UTC
    ports:
      - "5432:5432"
    volumes:
      - data_local_postgres:/var/lib/postgresql/data
      - ./init_db.sh:/docker-entrypoint-initdb.d/init_db.sh
volumes:
  data_local_postgres:
